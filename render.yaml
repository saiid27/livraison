services:
  - type: web
    name: mayahsar-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: delivery_backend
    buildCommand: pip install -r requirements.txt
    # NOTE: support call presence/state (_admins, _clients, _calls in
    # app/routes/support_calls.py) lives in in-process memory. Running more
    # than one Gunicorn worker would split traffic across processes with
    # disjoint state, so an admin connected to worker A would never see a
    # call_start handled by worker B ("appel du client n'arrive pas").
    # Keep --workers 1 (threads still give us concurrency for the
    # websocket connections) unless that state is moved to Redis/pubsub.
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 100 run:app
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mayahsar-db
          property: connectionString

databases:
  - name: mayahsar-db
    plan: free
    region: frankfurt
    databaseName: mayahsar
    user: mayahsar
    ipAllowList: []
